<html lang="zh-TW" class="overflow-x-hidden">
<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Montserrat:wght@700;900&display=swap');
        
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --hk-sky: #0ea5e9;
            --hk-deep: #0c4a6e;
            --hk-bg: #f0f4f8;
            --hk-glass: rgba(255, 255, 255, 0.45);
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--hk-bg);
            color: #1e293b;
            letter-spacing: -0.01em;
            overflow-x: hidden;
            width: 100%;
            transition: background-color 0.3s ease;
        }

        /* 視差背景層 */
        .parallax-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 120%;
            pointer-events: none;
            z-index: -1;
            will-change: transform;
            transform: translateZ(0);
        }

        .bg-glow-1 {
            position: absolute;
            top: -10%;
            right: -15%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(14, 165, 233, 0.2) 0%, transparent 70%);
            filter: blur(40px);
        }

        .bg-glow-2 {
            position: absolute;
            bottom: 20%;
            left: -10%;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, transparent 70%);
            filter: blur(40px);
        }

        /* 深色模式 */
        @media (prefers-color-scheme: dark) {
            body { background-color: #0f172a; color: #f1f5f9; }
            .bg-glow-1 { background: radial-gradient(circle, rgba(14, 165, 233, 0.15) 0%, transparent 70%); }
            .bg-glow-2 { background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, transparent 70%); }
            .glass-card { background: rgba(30, 41, 59, 0.7) !important; border-color: rgba(255, 255, 255, 0.1) !important; }
            .text-slate-800 { color: #f1f5f9 !important; }
            .text-slate-700 { color: #e2e8f0 !important; }
            .bg-white\/40 { background: rgba(15, 23, 42, 0.4) !important; }
            .bg-white\/30 { background: rgba(255, 255, 255, 0.05) !important; }
            .bg-white\/50 { background: rgba(30, 41, 59, 0.5) !important; }
            .bg-sky-50 { background: rgba(14, 165, 233, 0.1) !important; }
            input { color: #ffffff !important; }
        }

        @keyframes fadeInSlide {
            0% { opacity: 0; transform: translateX(-20px); }
            100% { opacity: 1; transform: translateX(0); }
        }
        .animate-header-info { animation: fadeInSlide 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

        @keyframes cardSlideIn {
            0% { opacity: 0; transform: translateY(30px) scale(0.96); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .stagger-item {
            opacity: 0;
            animation: cardSlideIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .day-active {
            background: var(--hk-deep) !important; 
            color: #ffffff !important;
            transform: scale(1.05);
            box-shadow: 0 12px 24px -8px rgba(12, 74, 110, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
        }
        .day-active span, .day-active i { color: #ffffff !important; opacity: 1 !important; }

        .utility-active {
            background: var(--hk-sky) !important;
            color: white !important;
            box-shadow: 0 8px 16px -4px rgba(14, 165, 233, 0.4);
            border-color: rgba(255, 255, 255, 0.3) !important;
        }
        .utility-active i, .utility-active span { color: white !important; }

        .scroller-container { position: relative; width: 100%; }
        .scroller-mask-left {
            position: absolute; left: 0; top: 0; bottom: 0; width: 30px; z-index: 10;
            background: linear-gradient(to right, var(--hk-bg), transparent);
            pointer-events: none; opacity: 0; transition: opacity 0.3s;
        }
        .scroller-mask-right {
            position: absolute; right: 0; top: 0; bottom: 0; width: 30px; z-index: 10;
            background: linear-gradient(to left, var(--hk-bg), transparent);
            pointer-events: none; transition: opacity 0.3s;
        }

        .glass-card {
            background: var(--hk-glass);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.04);
            transform: translateZ(0);
        }

        .sticky-nav-wrapper {
            position: sticky;
            top: 0;
            z-index: 50;
            padding: 8px 0;
            width: 100%;
            transition: all 0.3s ease;
        }
        
        .is-stuck {
            background: var(--hk-glass);
            backdrop-filter: blur(20px);
            box-shadow: 0 4px 20px -5px rgba(0,0,0,0.05);
            padding: 10px 0;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .content-collapsed { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .content-expanded { max-height: 1500px; transition: max-height 0.6s cubic-bezier(0.4, 0, 0.2, 1); }

        .font-montserrat { font-family: 'Montserrat', sans-serif; }

        #subway-panel {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translateY(20px) scale(0.9);
            opacity: 0;
            pointer-events: none;
        }
        #subway-panel.active { transform: translateY(0) scale(1); opacity: 1; pointer-events: auto; }
        #map-modal { transition: opacity 0.3s ease; z-index: 100; }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* 防止橫向滾動的核心修正 */
        main { width: 100%; overflow-x: hidden; }
        .max-w-lg { max-width: 100%; }
        @media (min-width: 512px) { .max-w-lg { max-width: 512px; } }
    </style>
</head>

        async function init() {
            detectCurrentDay();
            await updateWeatherFromJMA();
            renderDayButtons();
            renderContent();
            setupScrollerEvents();
            setupSimplifiedScroll();
            document.getElementById('map-modal').addEventListener('click', (e) => { if (e.target.id === 'map-modal') closeSubwayMap(); });
        }

        async function updateWeatherFromJMA() {
            try {
                const [respSap, respNob] = await Promise.all([
                    fetch('https://www.jma.go.jp/bosai/forecast/data/forecast/016000.json'),
                    fetch('https://www.jma.go.jp/bosai/forecast/data/forecast/015000.json')
                ]);
                const dataSap = await respSap.json(), dataNob = await respNob.json();
                const sapForecasts = dataSap[1].timeSeries[0], sapTemps = dataSap[1].timeSeries[2];
                const nobForecasts = dataNob[1].timeSeries[0], nobTemps = dataNob[1].timeSeries[2];
                itinerary.forEach((day, index) => {
                    const currentYear = new Date().getFullYear();
                    const dayParts = day.date.split('/');
                    const targetDateStr = `${currentYear}-${dayParts[0].padStart(2, '0')}-${dayParts[1].padStart(2, '0')}`;
                    const source = (index === 4 || index === 5) ? nobForecasts : sapForecasts;
                    const tempSource = (index === 4 || index === 5) ? nobTemps : sapTemps;
                    const dateIdx = source.timeDefines.findIndex(d => d.startsWith(targetDateStr));
                    if (dateIdx !== -1) {
                        day.weather_jp = source.areas[0].weathers[dateIdx].replace(/　/g, ' ');
                        const minT = tempSource.areas[0].tempsMin[dateIdx] || '--';
                        const maxT = tempSource.areas[0].tempsMax[dateIdx] || '--';
                        day.temp = `${minT}°C / ${maxT}°C`;
                        isWeatherLive = true;
                    }
                });
            } catch (error) { console.error("JMA Failed:", error); }
        }

        // --- 功能模組 ---
        function getChecklist() { 
            const saved = localStorage.getItem('hk_checklist_v2');
            if (saved) return JSON.parse(saved);
            const defaults = ["護照正本", "日幣/信用卡", "保險文件", "演唱會門票", "VJW QR碼"];
            return defaults.map(name => ({ id: Math.random(), name, checked: false }));
        }
        function saveChecklist(list) { localStorage.setItem('hk_checklist_v2', JSON.stringify(list)); }
        function addChecklistItem() {
            const input = document.getElementById('check-input'), val = input.value.trim();
            if (!val) return;
            const list = getChecklist(); list.push({ id: Date.now(), name: val, checked: false });
            saveChecklist(list); input.value = ''; renderChecklist();
        }
        function toggleCheckItem(id) {
            const list = getChecklist(), item = list.find(i => i.id === id);
            if (item) item.checked = !item.checked; saveChecklist(list); renderChecklist();
        }
        function deleteCheckItem(id) { saveChecklist(getChecklist().filter(i => i.id !== id)); renderChecklist(); }

        function renderChecklist() {
            const area = document.getElementById('content-area'), list = getChecklist();
            area.innerHTML = `<div>
                <div class="mb-10 text-center stagger-item" style="animation-delay: 0s">
                    <i class="fas fa-clipboard-check text-sky-500 text-4xl mb-5"></i>
                    <p class="text-sky-600 font-black text-[11px] uppercase tracking-widest mb-1">Preparation</p>
                    <h2 class="text-4xl font-black text-slate-800 tracking-tight">行前清單</h2>
                </div>
                <!-- 修正後的輸入區域 -->
                <div class="glass-card p-4 rounded-[28px] mb-8 stagger-item" style="animation-delay: 0.1s">
                    <div class="flex space-x-2">
                        <input type="text" id="check-input" placeholder="新增準備項目..." onkeypress="if(event.key==='Enter')addChecklistItem()" class="flex-1 min-w-0 bg-white/30 border border-white/50 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-sky-500">
                        <button onclick="addChecklistItem()" class="whitespace-nowrap bg-sky-600 text-white px-5 py-3 rounded-xl text-sm font-bold shadow-lg">新增</button>
                    </div>
                </div>
                <div class="space-y-4">
                    ${list.map((item, i) => `<div class="glass-card p-5 rounded-[24px] flex items-center justify-between stagger-item" style="animation-delay: ${0.2 + (i * 0.05)}s"><div onclick="toggleCheckItem(${item.id})" class="flex items-center flex-1 cursor-pointer"><div class="w-7 h-7 rounded-full border-2 ${item.checked ? 'bg-emerald-500 border-emerald-500' : 'border-white'} flex items-center justify-center mr-5 transition-all">${item.checked ? '<i class="fas fa-check text-white text-[10px]"></i>' : ''}</div><span class="text-[16px] font-bold ${item.checked ? 'opacity-30 line-through text-slate-500' : 'text-slate-700'}">${item.name}</span></div><button onclick="deleteCheckItem(${item.id})" class="text-slate-300 hover:text-rose-500 p-2 transition-colors"><i class="fas fa-trash-alt text-sm"></i></button></div>`).join('')}
                </div>
            </div>`;
        }

        function getShoppingList() { return JSON.parse(localStorage.getItem('hk_shopping_v3') || '[]'); }
        function saveShoppingList(list) { localStorage.setItem('hk_shopping_v3', JSON.stringify(list)); }
        function addShoppingItem() {
            const input = document.getElementById('shop-input'), val = input.value.trim();
            if (!val) return;
            const list = getShoppingList(); list.push({ id: Date.now(), name: val, owner: '', price: 0, checked: false });
            saveShoppingList(list); input.value = ''; renderShoppingList();
        }
        function updateShopPrice(id, price) {
            const list = getShoppingList(), item = list.find(i => i.id === id);
            if (item) item.price = parseFloat(price) || 0;
            saveShoppingList(list); calculateShoppingTotal();
        }
        function updateShopOwner(id, owner) {
            const list = getShoppingList(), item = list.find(i => i.id === id);
            if (item) item.owner = owner;
            saveShoppingList(list);
        }
        function calculateShoppingTotal() {
            const list = getShoppingList();
            const jpyTotal = list.filter(i => i.checked).reduce((sum, i) => sum + i.price, 0);
            const totalEl = document.getElementById('shopping-total-display');
            if (totalEl) totalEl.innerHTML = `已購總計: <span class="text-emerald-600 font-black">¥${jpyTotal.toLocaleString()}</span><br><span class="text-[11px] opacity-60">≈ NT$ ${Math.round(jpyTotal * JPY_TO_TWD).toLocaleString()}</span>`;
        }
        function toggleShoppingItem(id) {
            const list = getShoppingList(), item = list.find(i => i.id === id);
            if (item) item.checked = !item.checked; saveShoppingList(list); renderShoppingList();
        }
        function deleteShoppingItem(id) { saveShoppingList(getShoppingList().filter(i => i.id !== id)); renderShoppingList(); }
        
        function renderShoppingList() {
            const area = document.getElementById('content-area'), list = getShoppingList();
            area.innerHTML = `<div>
                <div class="mb-10 text-center stagger-item" style="animation-delay: 0s">
                    <i class="fas fa-shopping-bag text-sky-500 text-4xl mb-5"></i>
                    <p class="text-sky-600 font-black text-[11px] uppercase tracking-widest mb-1">Shopping & Orders</p>
                    <h2 class="text-4xl font-black text-slate-800 tracking-tight">代購清單</h2>
                </div>
                <!-- 修正後的輸入區域 -->
                <div class="glass-card p-4 rounded-[28px] mb-8 stagger-item" style="animation-delay: 0.1s">
                    <div class="flex space-x-2">
                        <input type="text" id="shop-input" placeholder="新增代購品名..." onkeypress="if(event.key==='Enter')addShoppingItem()" class="flex-1 min-w-0 bg-white/30 border border-white/50 rounded-xl px-4 py-3 text-sm focus:outline-none">
                        <button onclick="addShoppingItem()" class="whitespace-nowrap bg-sky-600 text-white px-5 py-3 rounded-xl text-sm font-bold shadow-lg">新增</button>
                    </div>
                </div>
                <div class="space-y-5">
                    ${list.map((item, i) => `
                        <div class="glass-card p-6 rounded-[28px] flex flex-col space-y-4 stagger-item" style="animation-delay: ${0.2 + (i * 0.05)}s">
                            <div class="flex items-center justify-between">
                                <div onclick="toggleShoppingItem(${item.id})" class="flex items-center flex-1 cursor-pointer min-w-0">
                                    <div class="w-7 h-7 rounded-full border-2 flex-shrink-0 ${item.checked ? 'bg-emerald-500 border-emerald-500' : 'border-white'} flex items-center justify-center mr-5 transition-all">
                                        ${item.checked ? '<i class="fas fa-check text-white text-[10px]"></i>' : ''}
                                    </div>
                                    <span class="text-[17px] font-bold truncate ${item.checked ? 'opacity-30 line-through text-slate-500' : 'text-slate-800'}">${item.name}</span>
                                </div>
                                <button onclick="deleteShoppingItem(${item.id})" class="text-slate-300 hover:text-rose-500 transition-colors p-2"><i class="fas fa-trash-alt text-sm"></i></button>
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div class="bg-white/40 dark:bg-slate-800/40 p-3 rounded-2xl border border-white/50 min-w-0">
                                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">給誰</span>
                                    <input type="text" value="${item.owner || ''}" placeholder="委託人" onchange="updateShopOwner(${item.id}, this.value)" class="w-full bg-transparent text-[13px] font-bold text-slate-700 outline-none">
                                </div>
                                <div class="bg-white/40 dark:bg-slate-800/40 p-3 rounded-2xl border border-white/50 min-w-0">
                                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1 text-right">價格 ¥</span>
                                    <input type="number" value="${item.price || ''}" placeholder="0" onchange="updateShopPrice(${item.id}, this.value)" class="w-full bg-transparent text-[14px] font-black font-montserrat text-right text-slate-700 outline-none">
                                </div>
                            </div>
                        </div>`).join('')}
                </div>
                <div id="shopping-total-display" class="mt-10 p-8 glass-card rounded-[32px] text-center font-bold text-slate-700 text-lg border-emerald-400/30 stagger-item" style="animation-delay: 0.5s"></div>
            </div>`;
            calculateShoppingTotal();
        }

        // --- 核心 UI 控制 ---
        function switchView(view, idx = 0) {
            currentView = view;
            if (view === 'day') { currentDayIdx = idx; expandedActivityIdx = null; isTransitExpanded = false; }
            updateActiveState();
            renderContent();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateActiveState() {
            document.querySelectorAll('.day-btn').forEach(btn => btn.classList.remove('day-active'));
            document.getElementById('btn-checklist-nav').classList.remove('utility-active');
            document.getElementById('btn-shopping-nav').classList.remove('utility-active');
            if (currentView === 'checklist') document.getElementById('btn-checklist-nav').classList.add('utility-active');
            else if (currentView === 'shopping') document.getElementById('btn-shopping-nav').classList.add('utility-active');
            else if (document.getElementById(`btn-day-${currentDayIdx}`)) document.getElementById(`btn-day-${currentDayIdx}`).classList.add('day-active');
        }

        function renderContent() { 
            if (currentView === 'checklist') renderChecklist(); 
            else if (currentView === 'shopping') renderShoppingList();
            else renderDay(); 
        }

        function updateExchange(jpy) {
            const val = document.getElementById('quick-calc').value;
            document.getElementById('twd-res').innerText = `≈ NT$ ${Math.round((parseFloat(val) || 0) * JPY_TO_TWD).toLocaleString()}`;
        }
        
        function clearCalculator() {
            const input = document.getElementById('quick-calc');
            input.value = ''; updateExchange(0); input.focus();
        }

        function renderDay() {
            const d = itinerary[currentDayIdx], area = document.getElementById('content-area');
            const weatherIcon = getWeatherIcon(d.weather_jp);
            area.innerHTML = `<div>
                <!-- 天氣卡片 -->
                <div class="glass-card rounded-[32px] p-8 mb-10 relative overflow-hidden stagger-item" style="animation-delay: 0s">
                    <div class="relative z-10">
                        <div class="flex items-center justify-between mb-3">
                            <p class="text-[10px] font-black ${isWeatherLive ? 'text-emerald-500' : 'text-sky-600'} uppercase tracking-widest flex items-center"><i class="fas fa-tower-broadcast mr-1.5 text-[8px]"></i> ${isWeatherLive ? 'Live: 日本氣象廳數據' : 'Weather Forecast'}</p>
                            ${isWeatherLive ? '<span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-ping"></span>' : ''}
                        </div>
                        <div class="flex items-center space-x-5 mb-6">
                            <i class="fas ${weatherIcon} text-5xl"></i>
                            <div><h2 class="text-3xl font-black text-slate-800">${d.weather_jp}</h2><p class="text-sm font-bold text-slate-400">${d.temp}</p></div>
                        </div>
                        <div class="flex items-start space-x-3"><i class="fas fa-feather text-sky-300 text-[12px] mt-1.5"></i><p class="text-sm font-medium text-slate-500 italic leading-relaxed opacity-95">${d.haiku}</p></div>
                    </div>
                </div>

                <section class="mb-12">
                    <h3 class="text-[11px] font-black text-slate-400 uppercase mb-6 pl-2 flex items-center tracking-widest stagger-item" style="animation-delay: 0.1s"><i class="fas fa-list-ul mr-2 text-sky-500"></i> Itinerary</h3>
                    <div class="space-y-4">
                    ${d.activities.map((act, i) => {
                        const exp = expandedActivityIdx === i;
                        return `<div class="glass-card rounded-[28px] overflow-hidden transition-all stagger-item ${exp ? 'ring-1 ring-sky-500/30 shadow-lg' : ''}" style="animation-delay: ${0.2 + (i * 0.1)}s"><div onclick="toggleActivity(${i})" class="p-5 flex items-center cursor-pointer active:bg-white/50"><span class="flex-1 text-[16px] font-bold text-slate-800 tracking-tight pl-2">${act.title}</span><i class="fas ${exp ? 'fa-minus' : 'fa-plus'} text-[10px] text-slate-300"></i></div><div class="${exp ? 'content-expanded' : 'content-collapsed'}"><div class="px-5 pb-5"><div class="p-5 bg-white/30 backdrop-blur-md rounded-2xl border border-white/40"><p class="text-[14px] text-slate-600 leading-relaxed mb-6 font-medium pt-2">${act.desc}</p><div class="space-y-2.5">${act.extraLink ? `<button onclick="window.open('${act.extraLink.url}', '_blank')" class="w-full bg-slate-900 text-white py-4 rounded-xl text-[12px] font-black border border-white flex items-center justify-center shadow-lg"><i class="fas ${act.extraLink.icon} mr-2 text-sm"></i> ${act.extraLink.label}</button>` : ''}<button onclick="openMap('${act.mapLink || act.title}')" class="w-full bg-white/60 text-slate-800 py-4 rounded-xl text-[12px] font-black border border-white flex items-center justify-center"><i class="fas fa-location-arrow mr-2 text-sky-600 text-sm"></i> View on Map</button></div></div></div></div></div>`;
                    }).join('')}
                </div></section>

                <div class="grid grid-cols-2 gap-4 mb-12">
                    <div onclick="openMap('${d.hotel}')" class="glass-card p-6 rounded-[32px] flex flex-col items-center text-center cursor-pointer active:scale-95 transition-all hover:bg-white/40 stagger-item" style="animation-delay: 0.5s">
                        <i class="fas fa-hotel text-sky-500 mb-3 text-2xl"></i>
                        <p class="text-[8px] text-slate-400 uppercase mb-1.5 tracking-widest">Stay (Open Map)</p>
                        <p class="text-[11px] font-bold text-slate-800 leading-snug">${d.hotel}</p>
                    </div>
                    <div onclick="toggleTransit()" class="glass-card p-6 rounded-[32px] flex flex-col items-center text-center cursor-pointer active:scale-95 transition-all hover:bg-white/40 stagger-item" style="animation-delay: 0.6s">
                        <i class="fas fa-train-subway text-indigo-500 mb-3 text-2xl"></i>
                        <p class="text-[8px] text-slate-400 uppercase mb-1.5 tracking-widest">Transit (Details)</p>
                        <p class="text-[11px] font-bold text-slate-800 leading-snug">${d.transport}</p>
                    </div>
                </div>

                <div id="transit-detail" class="${isTransitExpanded ? 'content-expanded' : 'content-collapsed'} mb-12">
                    <div class="glass-card p-7 rounded-[32px] border-indigo-200/30">
                        <div class="flex items-center justify-between mb-4 border-b border-indigo-100 pb-3">
                            <span class="text-[11px] font-black text-indigo-600 uppercase tracking-[0.2em]">Route Planning</span>
                            <button onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(itinerary[currentDayIdx].hotel)}&travelmode=transit','_blank')" class="text-[10px] font-bold text-sky-600 underline">導航至飯店</button>
                        </div>
                        <p class="text-[14px] text-slate-600 leading-loose">${d.transit_steps || '無特殊轉乘資訊。'}</p>
                    </div>
                </div>

                <section class="glass-card rounded-[32px] p-8 mb-12 stagger-item" style="animation-delay: 0.7s"><h3 class="text-[11px] font-black text-slate-400 uppercase mb-6 flex items-center tracking-widest"><i class="fas fa-utensils mr-2 text-rose-400"></i> Dining</h3><div class="space-y-4"><div onclick="openMap('${d.lunch}')" class="flex items-center justify-between p-5 bg-white/30 rounded-2xl cursor-pointer border border-white/50 shadow-sm"><span class="text-[9px] font-black text-sky-600 uppercase tracking-widest">Lunch</span><span class="text-[14px] font-bold text-slate-800">${d.lunch} <i class="fas fa-arrow-right-long ml-2 text-[10px] opacity-30"></i></span></div><div onclick="openMap('${d.dinner}')" class="flex items-center justify-between p-5 bg-white/30 rounded-2xl cursor-pointer border border-white/50 shadow-sm"><span class="text-[9px] font-black text-sky-600 uppercase tracking-widest">Dinner</span><span class="text-[14px] font-bold text-slate-800">${d.dinner} <i class="fas fa-arrow-right-long ml-2 text-[10px] opacity-30"></i></span></div></div></section>
                
                <section class="glass-card rounded-[32px] p-8 mb-16 border-none bg-sky-600/10 dark:bg-sky-500/5 stagger-item" style="animation-delay: 0.8s">
                    <div class="flex items-center justify-between mb-7">
                        <h3 class="text-[11px] font-black uppercase text-sky-600 dark:text-sky-400 tracking-widest">Rate Calculator</h3>
                        <i class="fas fa-calculator text-sky-300"></i>
                    </div>
                    <div class="relative flex items-center">
                        <span class="absolute left-0 text-3xl font-light text-slate-400 font-montserrat italic">¥</span>
                        <input type="number" id="quick-calc" oninput="updateExchange()" placeholder="輸入日幣" class="w-full bg-transparent border-b border-slate-200/50 py-4 pl-10 pr-10 text-4xl font-montserrat font-black text-slate-800 focus:outline-none">
                        <button onclick="clearCalculator()" class="absolute right-0 p-2 text-slate-300 hover:text-sky-500 transition-colors"><i class="fas fa-circle-xmark text-xl"></i></button>
                    </div>
                    <div id="twd-res" class="text-2xl font-bold text-sky-600 mt-8 py-3 px-6 bg-white/50 rounded-2xl inline-block shadow-sm">≈ NT$ 0</div>
                </section>
            </div>`;
        }

        function toggleActivity(idx) { expandedActivityIdx = expandedActivityIdx === idx ? null : idx; renderDay(); }
        function toggleTransit() { isTransitExpanded = !isTransitExpanded; renderDay(); }

        function renderDayButtons() {
            document.getElementById('day-buttons-container').innerHTML = itinerary.map((d, i) => `
                <button onclick="switchView('day', ${i})" id="btn-day-${i}" class="day-btn flex-shrink-0 w-12 h-12 rounded-xl bg-white/40 border border-white flex flex-col items-center justify-center transition-all shadow-sm backdrop-blur-md">
                    <span class="text-[8px] font-black text-slate-400 uppercase tracking-tighter">${d.day.split(' ')[1]}</span>
                    <span class="text-[13px] font-black text-slate-800 leading-none">${d.date.split('/')[1]}</span>
                </button>`).join('');
            updateActiveState();
        }

        function detectCurrentDay() {
            const now = new Date(), m = now.getMonth() + 1, d = now.getDate(), datesMap = { "3-26": 0, "3-27": 1, "3-28": 2, "3-29": 3, "3-30": 4, "3-31": 5, "4-1": 6, "4-2": 7 };
            if (datesMap.hasOwnProperty(`${m}-${d}`)) currentDayIdx = datesMap[`${m}-${d}`];
        }

        function setupScrollerEvents() {
            const scroller = document.getElementById('date-scroll-box'), mL = document.getElementById('mask-l'), mR = document.getElementById('mask-r');
            const upd = () => { 
                const sL = scroller.scrollLeft, max = scroller.scrollWidth - scroller.clientWidth; 
                mL.style.opacity = sL > 5 ? "1" : "0"; 
                mR.style.opacity = sL < max - 5 ? "1" : "0"; 
            };
            scroller.addEventListener('scroll', upd, { passive: true });
            setTimeout(() => { 
                const act = document.getElementById(currentView === 'shopping' ? 'btn-shopping-nav' : (currentView === 'checklist' ? 'btn-checklist-nav' : `btn-day-${currentDayIdx}`)); 
                if (act && act.id.startsWith('btn-day')) act.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' }); 
                upd(); 
            }, 500);
        }

        function setupSimplifiedScroll() {
            const infoHeader = document.getElementById('info-header'), stickyNav = document.getElementById('sticky-nav'), b1 = document.getElementById('bg-layer-1'), b2 = document.getElementById('bg-layer-2');
            window.addEventListener('scroll', () => {
                const y = window.scrollY;
                window.requestAnimationFrame(() => {
                    infoHeader.style.opacity = Math.max(0, 1 - y / 120);
                    infoHeader.style.transform = `translate3d(0, -${y * 0.4}px, 0)`;
                    b1.style.transform = `translate3d(0, ${y * 0.3}px, 0)`;
                    b2.style.transform = `translate3d(0, ${y * 0.2}px, 0)`;
                    if (y > 50) stickyNav.classList.add('is-stuck'); else stickyNav.classList.remove('is-stuck');
                });
            }, { passive: true });
        }

        const getWeatherIcon = (d) => {
            if (d.includes("晴")) return "fa-sun text-amber-500";
            if (d.includes("雪")) return "fa-snowflake text-sky-300";
            if (d.includes("雨")) return "fa-cloud-showers-heavy text-indigo-500";
            return "fa-cloud text-slate-400";
        };
        
        function openMap(q) { window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(q)}`, '_blank'); }
        function openSubwayMap() { document.getElementById('map-modal').classList.remove('hidden'); document.body.style.overflow='hidden'; toggleSubwayPanel(); }
        function closeSubwayMap() { document.getElementById('map-modal').classList.add('hidden'); document.body.style.overflow=''; }
        function toggleSubwayPanel() { document.getElementById('subway-panel').classList.toggle('active'); }
        
        function findNearestStation() {
            const info = document.getElementById('nearest-info'); info.classList.remove('hidden'); info.innerText = "定位中...";
            navigator.geolocation.getCurrentPosition((pos) => {
                const uLat = pos.coords.latitude, uLng = pos.coords.longitude;
                let nearest = null, minDist = Infinity;
                sapSubwayStations.forEach(st => { const d = Math.sqrt(Math.pow(st.lat - uLat, 2) + Math.pow(st.lng - uLng, 2)); if (d < minDist) { minDist = d; nearest = st; } });
                if (nearest) { info.innerHTML = `最近：<span class="text-sky-500 font-bold">${nearest.name}</span><br>導航中...`; setTimeout(() => { window.open(`https://www.google.com/maps/dir/?api=1&destination=${nearest.lat},${nearest.lng}`, '_blank'); toggleSubwayPanel(); }, 1200); }
            }, () => { info.innerText = "定位失敗。"; });
        }

        init();
    </script>
</body>
</html>
